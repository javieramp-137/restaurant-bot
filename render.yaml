services:
  - type: web
    name: evolution-api
    runtime: docker
    repo: https://github.com/javy012/restaurant-bot
    rootDir: evolution
    plan: free
    envVars:
      - key: SERVER_URL
        value: https://evolution-api.onrender.com

      - key: AUTHENTICATION_API_KEY
        value: 123456

      - key: DATABASE_ENABLED
        value: true

      - key: DATABASE_CONNECTION_URI
        sync: false

      - key: REDIS_ENABLED
        value: true

      - key: REDIS_URI
        sync: false

  - type: web
    name: restaurant-n8n
    runtime: docker
    repo: https://github.com/javy012/restaurant-bot
    rootDir: n8n
    plan: free
    envVars:
      - key: N8N_HOST
        value: restaurant-n8n.onrender.com

      - key: N8N_PROTOCOL
        value: https

      - key: WEBHOOK_URL
        value: https://restaurant-n8n.onrender.com

      - key: N8N_PORT
        value: 5678