services:

  # ─────────────────────────────────────────────
  #  EVOLUTION API v1.8.2  (WhatsApp Gateway)
  # ─────────────────────────────────────────────
  - type: web
    name: evolution-api
    runtime: docker
    repo: https://github.com/javieramp-137/restaurant-bot
    rootDir: evolution
    plan: free
    envVars:

      # ── Servidor ──────────────────────────────
      - key: SERVER_TYPE
        value: http
      - key: SERVER_PORT
        value: 8080
      - key: SERVER_URL
        value: https://evolution-api-y4sd.onrender.com

      # ── Autenticación ─────────────────────────
      - key: AUTHENTICATION_TYPE
        value: apikey
      - key: AUTHENTICATION_API_KEY
        value: mi_clave_secreta_123
      - key: AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES
        value: true

      # ── Base de datos (Neon PostgreSQL) ────────
      - key: DATABASE_ENABLED
        value: true
      - key: DATABASE_CONNECTION_URI
        value: PEGAR_URI_DE_NEON_AQUI
      - key: DATABASE_CONNECTION_CLIENT_NAME
        value: evolution_exchange

      # ── Redis (Upstash) ────────────────────────
      - key: REDIS_ENABLED
        value: true
      - key: REDIS_URI
        value: PEGAR_URI_DE_UPSTASH_AQUI
      - key: REDIS_PREFIX_KEY
        value: evolution

      # ── WhatsApp / QR ─────────────────────────
      - key: QRCODE_LIMIT
        value: 30
      - key: QRCODE_COLOR
        value: "#000000"

      # ── Storage (mínimo para ahorrar RAM) ─────
      - key: STORE_MESSAGES
        value: false
      - key: STORE_MESSAGE_UP
        value: false
      - key: STORE_CONTACTS
        value: false
      - key: STORE_CHATS
        value: false
      - key: CLEAN_STORE_CLEANING_INTERVAL
        value: 7200
      - key: CLEAN_STORE_MESSAGES
        value: true
      - key: CLEAN_STORE_MESSAGE_UP
        value: true
      - key: CLEAN_STORE_CONTACTS
        value: true
      - key: CLEAN_STORE_CHATS
        value: true

      # ── Instancias ────────────────────────────
      - key: DEL_INSTANCE
        value: false
      - key: DEL_TEMP_INSTANCES
        value: true

      # ── Logs ──────────────────────────────────
      - key: LOG_LEVEL
        value: ERROR
      - key: LOG_COLOR
        value: true
      - key: LOG_BAILEYS
        value: error

  # ─────────────────────────────────────────────
  #  N8N  (Automatización / Bot)
  # ─────────────────────────────────────────────
  - type: web
    name: restaurant-n8n
    runtime: docker
    repo: https://github.com/javieramp-137/restaurant-bot
    rootDir: n8n
    plan: free
    envVars:
      - key: N8N_HOST
        value: restaurant-n8n.onrender.com
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://restaurant-n8n.onrender.com
      - key: N8N_PORT
        value: 5678
      - key: N8N_SECURE_COOKIE
        value: false
      - key: N8N_ENCRYPTION_KEY
        value: 8MREKWOIlAgd5nUeDUtWTrT9y/F6/8yx
