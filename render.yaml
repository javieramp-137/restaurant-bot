services:

  # ─────────────────────────────────────────────
  #  EVOLUTION API  (WhatsApp Gateway)
  # ─────────────────────────────────────────────
  - type: web
    name: evolution-api
    runtime: docker
    repo: https://github.com/javy012/restaurant-bot
    rootDir: evolution
    plan: free
    envVars:

      # ── Servidor ──────────────────────────────
      - key: SERVER_TYPE
        value: http
      - key: SERVER_PORT
        value: 8080

      # IMPORTANTE: reemplaza con la URL real que Render te asigne
      # Ejemplo: https://evolution-api-xxxx.onrender.com
      - key: SERVER_URL
        value: https://evolution-api.onrender.com

      # ── Autenticación ─────────────────────────
      # Cambia este valor por una clave segura tuya
      - key: AUTHENTICATION_API_KEY
        value: mi_clave_secreta_123

      # ── Base de datos (Neon PostgreSQL) ────────
      - key: DATABASE_ENABLED
        value: true
      - key: DATABASE_PROVIDER
        value: postgresql
      # Pega aquí la "Connection string" de Neon.tech
      # Formato: postgresql://user:pass@host/dbname?sslmode=require
      - key: DATABASE_CONNECTION_URI
        value: PEGAR_URI_DE_NEON_AQUI

      # ── Redis (Upstash) ────────────────────────
      - key: CACHE_REDIS_ENABLED
        value: true
      # Pega aquí la Redis URL de Upstash
      # Formato: rediss://default:password@host:port
      - key: CACHE_REDIS_URI
        value: PEGAR_URI_DE_UPSTASH_AQUI
      - key: CACHE_REDIS_PREFIX_KEY
        value: evolution

      # ── WhatsApp / QR ─────────────────────────
      - key: CONFIG_SESSION_PHONE_CLIENT
        value: Chrome
      - key: CONFIG_SESSION_PHONE_VERSION
        value: 2.3000.1023054779
      - key: QRCODE_LIMIT
        value: 30
      - key: QRCODE_COLOR
        value: "#000000"

      # ── Logs ──────────────────────────────────
      - key: LOG_LEVEL
        value: ERROR
      - key: LOG_COLOR
        value: false
      - key: LOG_BAILEYS
        value: false

  # ─────────────────────────────────────────────
  #  N8N  (Automatización / Bot)
  # ─────────────────────────────────────────────
  - type: web
    name: restaurant-n8n
    runtime: docker
    repo: https://github.com/javy012/restaurant-bot
    rootDir: n8n
    plan: free
    envVars:

      # IMPORTANTE: reemplaza con la URL real que Render te asigne
      # Ejemplo: https://restaurant-n8n-xxxx.onrender.com
      - key: N8N_HOST
        value: restaurant-n8n.onrender.com
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://restaurant-n8n.onrender.com
      - key: N8N_PORT
        value: 5678
      - key: N8N_SECURE_COOKIE
        value: false

      # Clave de encriptación — usa la misma que ya tenías en tu config
      - key: N8N_ENCRYPTION_KEY
        value: 8MREKWOIlAgd5nUeDUtWTrT9y/F6/8yx
